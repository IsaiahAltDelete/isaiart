<!DOCTYPE html>
<html lang="en" data-style="default" data-color="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Flow Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        /* ════════════════════════════════════════
           BASE VARIABLES (dark / default)
        ════════════════════════════════════════ */
        :root {
            --accent:         #3B82F6;
            --accent-hover:   #2563EB;
            --accent-trans:   rgba(59,130,246,0.12);
            --success:        #22C55E;
            --danger:         #EF4444;
            --danger-hover:   #DC2626;
            --bg:             #0C0D13;
            --text:           #E2E8F0;
            --subtle:         #52586A;
            --card-bg:        rgba(18,22,38,0.72);
            --border:         rgba(255,255,255,0.07);
            --hover-bg:       rgba(255,255,255,0.05);
            --input-bg:       rgba(255,255,255,0.04);
            --dropdown-bg:    #151929;
            --shadow:         rgba(0,0,0,0.55);
            --panel-radius:   1.5rem;
            --btn-radius:     0.5rem;
            --font-main:      'Poppins', sans-serif;
        }

        /* ════════════════════════════════════════
           COLOR THEMES
        ════════════════════════════════════════ */
        html[data-color="white"] {
            --bg:          #F0F3F8;
            --text:        #1E2433;
            --subtle:      #788099;
            --card-bg:     rgba(255,255,255,0.78);
            --border:      rgba(0,0,0,0.07);
            --hover-bg:    rgba(0,0,0,0.04);
            --input-bg:    #FFFFFF;
            --dropdown-bg: #FFFFFF;
            --shadow:      rgba(0,0,0,0.10);
            --accent:      #4F46E5;
            --accent-hover:#4338CA;
            --accent-trans:rgba(79,70,229,0.10);
            --success:     #16A34A;
        }
        html[data-color="blue"] {
            --bg:          #04090F;
            --text:        #BAD6F5;
            --subtle:      #3B5978;
            --card-bg:     rgba(6,20,45,0.74);
            --border:      rgba(56,189,248,0.09);
            --hover-bg:    rgba(56,189,248,0.06);
            --input-bg:    rgba(56,189,248,0.04);
            --dropdown-bg: #071628;
            --shadow:      rgba(0,10,40,0.6);
            --accent:      #38BDF8;
            --accent-hover:#0EA5E9;
            --accent-trans:rgba(56,189,248,0.12);
        }
        html[data-color="green"] {
            --bg:          #030A05;
            --text:        #AEEEC7;
            --subtle:      #2D6644;
            --card-bg:     rgba(5,18,10,0.74);
            --border:      rgba(34,197,94,0.09);
            --hover-bg:    rgba(34,197,94,0.06);
            --input-bg:    rgba(34,197,94,0.04);
            --dropdown-bg: #06150C;
            --shadow:      rgba(0,20,5,0.65);
            --accent:      #22C55E;
            --accent-hover:#16A34A;
            --accent-trans:rgba(34,197,94,0.12);
        }
        html[data-color="pink"] {
            --bg:          #0D0308;
            --text:        #FAC8E8;
            --subtle:      #7A3060;
            --card-bg:     rgba(28,6,22,0.74);
            --border:      rgba(244,114,182,0.09);
            --hover-bg:    rgba(244,114,182,0.06);
            --input-bg:    rgba(244,114,182,0.04);
            --dropdown-bg: #1A0515;
            --shadow:      rgba(40,0,25,0.65);
            --accent:      #F472B6;
            --accent-hover:#EC4899;
            --accent-trans:rgba(244,114,182,0.12);
        }
        html[data-color="orange"] {
            --bg:          #0C0500;
            --text:        #FDDCB5;
            --subtle:      #7A4A1A;
            --card-bg:     rgba(25,12,0,0.74);
            --border:      rgba(251,146,60,0.09);
            --hover-bg:    rgba(251,146,60,0.06);
            --input-bg:    rgba(251,146,60,0.04);
            --dropdown-bg: #1C0E00;
            --shadow:      rgba(40,12,0,0.65);
            --accent:      #FB923C;
            --accent-hover:#EA580C;
            --accent-trans:rgba(251,146,60,0.12);
        }

        /* ════════════════════════════════════════
           STYLE THEMES
        ════════════════════════════════════════ */

        /* — GLASSMORPHIC (animated gradient background) — */
        html[data-style="glass"] #gradientBg { display: block !important; }
        html[data-style="glass"] #trackerPanel {
            background: rgba(255,255,255,0.05) !important;
            border-color: rgba(255,255,255,0.14) !important;
            backdrop-filter: blur(32px) saturate(200%) !important;
            -webkit-backdrop-filter: blur(32px) saturate(200%) !important;
        }

        /* — NEUMORPHIC — */
        html[data-style="neumorphic"] {
            --bg:          #DDE5EF;
            --text:        #2C3650;
            --subtle:      #7A8BA5;
            --card-bg:     #DDE5EF;
            --border:      transparent;
            --hover-bg:    #D0D9E5;
            --input-bg:    #DDE5EF;
            --dropdown-bg: #DDE5EF;
            --shadow:      rgba(0,0,0,0.1);
            --panel-radius:1.75rem;
        }
        html[data-style="neumorphic"][data-color="blue"] {
            --bg:#CEDEF0; --card-bg:#CEDEF0; --input-bg:#CEDEF0; --dropdown-bg:#CEDEF0; --hover-bg:#C0D2E8;
        }
        html[data-style="neumorphic"][data-color="green"] {
            --bg:#CEEADE; --card-bg:#CEEADE; --input-bg:#CEEADE; --dropdown-bg:#CEEADE; --hover-bg:#C0DDD2;
        }
        html[data-style="neumorphic"][data-color="pink"] {
            --bg:#EDD4E9; --card-bg:#EDD4E9; --input-bg:#EDD4E9; --dropdown-bg:#EDD4E9; --hover-bg:#E0C6DC;
        }
        html[data-style="neumorphic"][data-color="orange"] {
            --bg:#EFE0D0; --card-bg:#EFE0D0; --input-bg:#EFE0D0; --dropdown-bg:#EFE0D0; --hover-bg:#E2D2C0;
        }
        html[data-style="neumorphic"][data-color="white"] {
            --bg:#E8EEF6; --card-bg:#E8EEF6; --input-bg:#E8EEF6; --dropdown-bg:#E8EEF6; --hover-bg:#DDE4EE;
        }
        html[data-style="neumorphic"] #trackerPanel {
            background: var(--bg) !important;
            backdrop-filter: none !important; -webkit-backdrop-filter: none !important;
            border: none !important;
            box-shadow: 14px 14px 28px rgba(163,177,198,0.65), -14px -14px 28px rgba(255,255,255,0.85) !important;
        }
        html[data-style="neumorphic"] #reminderControls {
            background: var(--bg) !important;
            border: none !important;
            box-shadow: 10px 10px 20px rgba(163,177,198,0.55), -10px -10px 20px rgba(255,255,255,0.75) !important;
        }
        html[data-style="neumorphic"] .sound-card {
            box-shadow: 4px 4px 8px rgba(163,177,198,0.5), -4px -4px 8px rgba(255,255,255,0.7);
            border: none !important;
        }
        html[data-style="neumorphic"] .sound-card.selected {
            box-shadow: inset 3px 3px 7px rgba(163,177,198,0.5), inset -3px -3px 7px rgba(255,255,255,0.7) !important;
        }

        /* — MINIMAL — */
        html[data-style="minimal"] {
            --panel-radius: 0.375rem;
            --btn-radius:   0.125rem;
        }
        html[data-style="minimal"] #trackerPanel {
            background: var(--bg) !important;
            backdrop-filter: none !important; -webkit-backdrop-filter: none !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--panel-radius) !important;
            box-shadow: none !important;
        }
        html[data-style="minimal"] #reminderControls {
            border-radius: 0.25rem !important;
            box-shadow: 0 4px 12px var(--shadow) !important;
        }
        html[data-style="minimal"] .sound-card { border-radius: 0.125rem !important; }
        html[data-style="minimal"] button { border-radius: var(--btn-radius) !important; }

        /* — PIXEL — */
        html[data-style="pixel"] {
            --font-main:   'VT323', monospace;
            --panel-radius:0px;
            --btn-radius:  0px;
            --bg:          #080808;
            --text:        #33FF66;
            --subtle:      #195E30;
            --card-bg:     #080808;
            --border:      #33FF66;
            --hover-bg:    rgba(51,255,102,0.08);
            --input-bg:    #000000;
            --dropdown-bg: #080808;
            --accent:      #33FF66;
            --accent-hover:#00CC44;
            --accent-trans:rgba(51,255,102,0.12);
            --success:     #33FF66;
        }
        html[data-style="pixel"][data-color="blue"]   { --text:#33CCFF; --subtle:#114466; --border:#33CCFF; --accent:#33CCFF; --accent-hover:#0099CC; --accent-trans:rgba(51,204,255,0.12); --success:#33CCFF; --hover-bg:rgba(51,204,255,0.08); }
        html[data-style="pixel"][data-color="pink"]   { --text:#FF66CC; --subtle:#661144; --border:#FF66CC; --accent:#FF66CC; --accent-hover:#CC3399; --accent-trans:rgba(255,102,204,0.12); --success:#FF66CC; --hover-bg:rgba(255,102,204,0.08); }
        html[data-style="pixel"][data-color="orange"] { --text:#FF9933; --subtle:#663300; --border:#FF9933; --accent:#FF9933; --accent-hover:#CC6600; --accent-trans:rgba(255,153,51,0.12); --success:#FF9933; --hover-bg:rgba(255,153,51,0.08); }
        html[data-style="pixel"][data-color="white"]  { --bg:#EEEEEE; --text:#111111; --subtle:#444444; --border:#111111; --card-bg:#DDDDDD; --input-bg:#FFFFFF; --dropdown-bg:#DDDDDD; --hover-bg:rgba(0,0,0,0.07); --accent:#111111; --accent-hover:#000000; --accent-trans:rgba(0,0,0,0.1); }
        html[data-style="pixel"][data-color="dark"]   { --text:#33FF66; --subtle:#195E30; --border:#33FF66; --accent:#33FF66; }
        html[data-style="pixel"] #pixelBg { display: block !important; }
        html[data-style="pixel"] #trackerPanel {
            background: var(--bg) !important;
            backdrop-filter: none !important; -webkit-backdrop-filter: none !important;
            border: 3px solid var(--border) !important;
            border-radius: 0 !important;
            box-shadow: 6px 6px 0 var(--accent) !important;
        }
        html[data-style="pixel"] #reminderControls {
            border: 3px solid var(--border) !important;
            border-radius: 0 !important;
            box-shadow: 6px 6px 0 var(--accent) !important;
        }
        html[data-style="pixel"] .sound-card { border: 2px solid var(--border) !important; border-radius: 0 !important; }
        html[data-style="pixel"] .sound-card.selected { box-shadow: 3px 3px 0 var(--accent); }
        html[data-style="pixel"] h1 { font-size: 1.8rem !important; letter-spacing: 3px; }
        html[data-style="pixel"] #addCallBtn { border-radius: 0 !important; }

        /* — RETRO WINDOWS — */
        html[data-style="retro"] {
            --bg:          #008080;
            --text:        #000000;
            --subtle:      #333333;
            --card-bg:     #C0C0C0;
            --border:      #C0C0C0;
            --hover-bg:    #A8A8A8;
            --input-bg:    #FFFFFF;
            --dropdown-bg: #FFFFFF;
            --accent:      #000080;
            --accent-hover:#000060;
            --accent-trans:rgba(0,0,128,0.12);
            --success:     #008000;
            --shadow:      rgba(0,0,0,0.55);
            --panel-radius:0px;
            --btn-radius:  0px;
            --font-main:   'Courier New', monospace;
        }
        html[data-style="retro"][data-color="green"]  { --accent:#005000; --accent-hover:#003800; --bg:#007060; }
        html[data-style="retro"][data-color="pink"]   { --accent:#800060; --accent-hover:#600048; --bg:#807080; }
        html[data-style="retro"][data-color="orange"] { --accent:#804000; --accent-hover:#602800; --bg:#807040; }
        html[data-style="retro"][data-color="blue"]   { --accent:#000090; --accent-hover:#000070; }
        html[data-style="retro"][data-color="white"]  { --bg:#D0D0D0; }
        html[data-style="retro"][data-color="dark"]   { --bg:#004848; }
        html[data-style="retro"] #trackerPanel {
            background: #C0C0C0 !important;
            backdrop-filter: none !important; -webkit-backdrop-filter: none !important;
            border: none !important;
            border-radius: 0 !important;
            box-shadow: inset -2px -2px 0 #000, inset 2px 2px 0 #fff, inset -4px -4px 0 #808080, inset 4px 4px 0 #DFDFDF !important;
        }
        html[data-style="retro"] #retroTitleBar { display: flex !important; }
        html[data-style="retro"] #reminderControls {
            background: #C0C0C0 !important;
            border: none !important;
            border-radius: 0 !important;
            box-shadow: inset -2px -2px 0 #000, inset 2px 2px 0 #fff, inset -4px -4px 0 #808080, inset 4px 4px 0 #DFDFDF !important;
        }
        html[data-style="retro"] .sound-card {
            background: #C0C0C0 !important;
            color: #000 !important;
            border: none !important;
            border-radius: 0 !important;
            box-shadow: inset -2px -2px 0 #000, inset 2px 2px 0 #fff, inset -4px -4px 0 #808080, inset 4px 4px 0 #DFDFDF !important;
        }
        html[data-style="retro"] .sound-card:hover { background: #C0C0C0 !important; }
        html[data-style="retro"] .sound-card.selected {
            box-shadow: inset 2px 2px 0 #000, inset -2px -2px 0 #fff, inset 4px 4px 0 #808080, inset -4px -4px 0 #DFDFDF !important;
        }
        html[data-style="retro"] #addCallBtn {
            background: #C0C0C0 !important;
            color: #000 !important;
            border-radius: 0 !important;
            box-shadow: inset -2px -2px 0 #000, inset 2px 2px 0 #fff, inset -4px -4px 0 #808080, inset 4px 4px 0 #DFDFDF !important;
        }
        html[data-style="retro"] #addCallBtn:active {
            box-shadow: inset 2px 2px 0 #000, inset -2px -2px 0 #fff, inset 4px 4px 0 #808080, inset -4px -4px 0 #DFDFDF !important;
        }
        html[data-style="retro"] input[type=range]::-webkit-slider-runnable-track { background:#fff; border:1px inset #888; }
        html[data-style="retro"] input[type=range]::-webkit-slider-thumb { background:#C0C0C0; box-shadow:inset -1px -1px 0 #000,inset 1px 1px 0 #fff; border-radius:0; }
        html[data-style="retro"] h1 { font-size: 1rem !important; letter-spacing:0; }
        html[data-style="retro"] .toggle-switch .slider { border-radius: 0; }
        html[data-style="retro"] .toggle-switch .slider:before { border-radius: 0; }

        /* ════════════════════════════════════════
           GLOBAL BASE STYLES
        ════════════════════════════════════════ */
        body {
            font-family: var(--font-main);
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.4s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* ── Animated gradient background (glassmorphic) ── */
        #gradientBg {
            display: none;
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            background: #060818;
        }
        #gradientBg::before {
            content: '';
            position: absolute;
            width: 180%; height: 180%;
            top: -40%; left: -40%;
            background: conic-gradient(
                from 0deg at 45% 55%,
                var(--accent) 0deg,
                transparent 80deg,
                var(--success) 150deg,
                transparent 200deg,
                color-mix(in srgb, var(--accent) 50%, purple) 270deg,
                transparent 310deg,
                var(--accent) 360deg
            );
            filter: blur(70px);
            opacity: 0.45;
            animation: rotateBg 20s linear infinite;
        }
        #gradientBg::after {
            content: '';
            position: absolute;
            width: 60%; height: 60%;
            top: 10%; left: 20%;
            background: radial-gradient(ellipse, var(--accent-trans) 0%, transparent 70%);
            filter: blur(40px);
            animation: floatBg 10s ease-in-out infinite alternate;
        }
        @keyframes rotateBg { to { transform: rotate(360deg); } }
        @keyframes floatBg  { from { transform: translate(0,0) scale(1); } to { transform: translate(8%, 5%) scale(1.15); } }

        /* ── Pixel grid background ── */
        #pixelBg {
            display: none;
            position: fixed;
            inset: 0;
            z-index: -1;
            background: var(--bg);
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 16px 16px;
        }

        /* ── Retro Windows title bar ── */
        #retroTitleBar {
            display: none;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            color: #fff;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 3px 5px;
            align-items: center;
            justify-content: space-between;
            margin: -1.5rem -0.5rem 1.25rem -1.5rem;
            font-family: 'Courier New', monospace;
            user-select: none;
        }
        .retro-win-btn {
            width: 16px; height: 14px;
            background: #C0C0C0;
            color: #000;
            font-size: 9px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset -1px -1px 0 #000, inset 1px 1px 0 #fff;
            cursor: pointer;
            font-weight: bold;
            margin-left: 2px;
        }

        /* ── Main Scene / Panel ── */
        #scene {
            perspective: 1500px;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            padding: 1rem;
        }
        #trackerPanel {
            width: 100%;
            max-width: 550px;
            height: 80vh;
            max-height: 750px;
            padding: 1.5rem 0.5rem 1.5rem 1.5rem;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1.0);
            cursor: grab;
            user-select: none;
            border-radius: var(--panel-radius);
            box-shadow: 0 25px 60px -10px var(--shadow);
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        #trackerPanel:active { cursor: grabbing; }

        /* ── Utilities ── */
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; vertical-align: middle; transition: color 0.2s; }
        .custom-hover:hover { background-color: var(--hover-bg) !important; }
        .subtle-text { color: var(--subtle); }
        .accent-bg { background-color: var(--accent) !important; color: #fff !important; }
        .accent-bg:hover { background-color: var(--accent-hover) !important; }

        /* ── Scrollbar ── */
        #callListContainer::-webkit-scrollbar { width: 5px; }
        #callListContainer::-webkit-scrollbar-track { background: transparent; }
        #callListContainer::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* ── Toggle Switch ── */
        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: var(--hover-bg); transition: .4s; border-radius: 24px; border: 1px solid var(--border); }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; transition: .4s cubic-bezier(0.68,-0.55,0.27,1.55); border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); border-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* ── Animations ── */
        .call-item { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .is-reminding { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%,90% { transform: translate3d(-1px,0,0); }
            20%,80%  { transform: translate3d(2px,0,0); }
            30%,50%,70% { transform: translate3d(-4px,0,0); }
            40%,60% { transform: translate3d(4px,0,0); }
        }

        /* ── Chart ── */
        #chartContainer { padding: 0.75rem 0; height: 120px; }
        #rateChart .grid-line { stroke: var(--border); stroke-width: 1; stroke-dasharray: 2,4; }
        #rateChart .chart-line { stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: url(#chartGradient); }
        #rateChart .chart-point { fill: var(--accent); stroke: var(--card-bg); stroke-width: 2; transition: r 0.2s; }
        #rateChart .chart-point:hover { r: 6; }

        /* ── Range input ── */
        input[type=range] { -webkit-appearance:none; width:100%; background:transparent; }
        input[type=range]:focus { outline:none; }
        input[type=range]::-webkit-slider-runnable-track { height:4px; cursor:pointer; background:var(--hover-bg); border-radius:4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; height:16px; width:16px; border-radius:50%; background:var(--accent); cursor:pointer; margin-top:-6px; border:2px solid var(--bg); }

        /* ════════════════════════════════════════
           REMINDER POPUP
        ════════════════════════════════════════ */
        #reminderControls {
            position: absolute;
            bottom: 100%; left: 0;
            width: 340px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 0.875rem;
            padding: 1.1rem;
            margin-bottom: 0.5rem;
            box-shadow: 0 12px 32px var(--shadow);
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            z-index: 50;
        }
        #reminderControls.visible { opacity:1; transform:translateY(0); pointer-events:auto; }

        /* ════════════════════════════════════════
           SOUND PICKER GRID
        ════════════════════════════════════════ */
        .sound-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-top: 6px;
        }
        .sound-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 6px 3px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.18s ease;
            font-family: var(--font-main);
        }
        .sound-card:hover {
            background: var(--hover-bg);
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        .sound-card.selected {
            background: var(--accent-trans);
            border-color: var(--accent);
        }
        .sound-card .s-emoji { font-size: 1.15rem; line-height: 1; }
        .sound-card .s-name { font-size: 0.55rem; color: var(--subtle); text-align: center; line-height: 1.2; }
        .sound-card.selected .s-name { color: var(--accent); font-weight: 600; }

        /* ════════════════════════════════════════
           THEME PICKER PANEL
        ════════════════════════════════════════ */
        #themePanel {
            position: fixed;
            top: 72px; right: 1.5rem;
            width: 290px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 16px 40px var(--shadow);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            z-index: 65;
            opacity: 0;
            transform: translateY(-8px) scale(0.96);
            pointer-events: none;
            transition: opacity 0.22s ease, transform 0.22s ease;
        }
        #themePanel.visible { opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }

        .tp-label {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--subtle);
            margin-bottom: 7px;
            display: block;
        }
        .style-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 1rem;
        }
        .style-btn {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            padding: 8px 4px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 0.625rem;
            cursor: pointer;
            transition: all 0.18s ease;
            font-size: 0.6rem;
            color: var(--subtle);
            font-family: var(--font-main);
        }
        .style-btn:hover { border-color: var(--accent); color: var(--text); }
        .style-btn.selected { border-color: var(--accent); background: var(--accent-trans); color: var(--accent); font-weight: 600; }
        .style-preview { width: 52px; height: 34px; border-radius: 4px; overflow: hidden; position: relative; flex-shrink: 0; }

        .color-row { display: flex; gap: 7px; flex-wrap: wrap; }
        .color-dot {
            width: 30px; height: 30px; border-radius: 50%;
            cursor: pointer;
            border: 2.5px solid transparent;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            position: relative;
        }
        .color-dot:hover { transform: scale(1.18); }
        .color-dot.selected {
            box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--text);
        }
    </style>
</head>
<body>

    <!-- ══ Main Scene ══ -->

    <!-- Modals -->
    <div id="resetConfirmModal" class="fixed inset-0 z-[80] flex items-center justify-center p-4 hidden" style="background:rgba(0,0,0,0.55); backdrop-filter:blur(6px);"></div>
    <div id="deleteConfirmModal" class="fixed inset-0 z-[80] flex items-center justify-center p-4 hidden" style="background:rgba(0,0,0,0.55); backdrop-filter:blur(6px);"></div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const html = document.documentElement;
        const panel = document.getElementById('trackerPanel');

        /* ══════════════════════════════════════
           3-D DRAG
        ══════════════════════════════════════ */
        let isDragging = false, prevX, prevY, rotX = 0, rotY = 0;
        panel.addEventListener('mousedown', e => {
            if (e.target.closest('button,input,a,.sound-card,.slider')) return;
            isDragging = true; prevX = e.clientX; prevY = e.clientY;
            panel.style.transition = 'transform 0.05s linear';
        });
        document.addEventListener('mousemove', e => {
            if (!isDragging) return;
            rotY += (e.clientX - prevX) * 0.25;
            rotX -= (e.clientY - prevY) * 0.25;
            rotX = Math.max(-15, Math.min(15, rotX));
            panel.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            prevX = e.clientX; prevY = e.clientY;
        });
        document.addEventListener('mouseup', () => {
            if (!isDragging) return; isDragging = false;
            panel.style.transition = 'transform 0.6s cubic-bezier(0.25,0.1,0.25,1)';
            panel.style.transform = 'rotateX(0deg) rotateY(0deg)';
            rotX = 0; rotY = 0;
        });
        panel.ondragstart = () => false;

        /* ══════════════════════════════════════
           THEME SYSTEM
        ══════════════════════════════════════ */
        let currentStyle = localStorage.getItem('cft-style') || 'default';
        let currentColor = localStorage.getItem('cft-color') || 'dark';

        function applyStyle(style) {
            html.setAttribute('data-style', style);
            currentStyle = style;
            localStorage.setItem('cft-style', style);
            document.querySelectorAll('.style-btn').forEach(b => b.classList.toggle('selected', b.dataset.style === style));
        }
        function applyColor(color) {
            html.setAttribute('data-color', color);
            currentColor = color;
            localStorage.setItem('cft-color', color);
            document.querySelectorAll('.color-dot').forEach(d => d.classList.toggle('selected', d.dataset.color === color));
            // Sync light/dark toggle icon
            const isLight = (color === 'white');
            document.getElementById('ico-light').style.display = isLight ? 'none' : 'inline-block';
            document.getElementById('ico-dark').style.display  = isLight ? 'inline-block' : 'none';
        }

        applyStyle(currentStyle);
        applyColor(currentColor);

        // Theme panel open/close
        const themePanel = document.getElementById('themePanel');
        document.getElementById('themePickerBtn').addEventListener('click', e => { e.stopPropagation(); themePanel.classList.toggle('visible'); });
        document.getElementById('closePanelBtn').addEventListener('click', () => themePanel.classList.remove('visible'));
        document.querySelectorAll('.style-btn').forEach(b => b.addEventListener('click', () => applyStyle(b.dataset.style)));
        document.querySelectorAll('.color-dot').forEach(d => d.addEventListener('click', () => applyColor(d.dataset.color)));

        // Dark/light quick toggle (swaps between dark and white)
        document.getElementById('lightDarkToggle').addEventListener('click', () => {
            applyColor(currentColor === 'white' ? 'dark' : 'white');
        });

        document.addEventListener('click', e => {
            if (!themePanel.contains(e.target) && !document.getElementById('themePickerBtn').contains(e.target))
                themePanel.classList.remove('visible');
        });

        /* ══════════════════════════════════════
           AUDIO ENGINE (12 sounds)
        ══════════════════════════════════════ */
        const Audio = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            _osc(freq, type, dur, vol = 0.1, startAt = null) {
                const t = startAt ?? this.ctx.currentTime;
                const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                o.connect(g); g.connect(this.ctx.destination);
                o.type = type; o.frequency.setValueAtTime(freq, t);
                g.gain.setValueAtTime(vol, t);
                g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
                o.start(t); o.stop(t + dur);
                return { o, g, t };
            },
            play(type) {
                this.init();
                const ctx = this.ctx, now = ctx.currentTime;

                switch (type) {
                    /* ── Existing ── */
                    case 'glass':
                        this._osc(1200,'sine',0.55,0.12);
                        break;

                    case 'digital': {
                        const o = ctx.createOscillator(), g = ctx.createGain();
                        o.connect(g); g.connect(ctx.destination);
                        o.type = 'square';
                        o.frequency.setValueAtTime(700, now);
                        o.frequency.exponentialRampToValueAtTime(120, now + 0.15);
                        g.gain.setValueAtTime(0.08, now);
                        g.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
                        o.start(now); o.stop(now + 0.15);
                        break;
                    }
                    case 'chime':
                        this._osc(523.25,'sine',0.55,0.1, now);
                        this._osc(659.25,'sine',0.55,0.09, now+0.06);
                        this._osc(783.99,'sine',0.55,0.08, now+0.12);
                        break;

                    case 'sonar': {
                        const o = ctx.createOscillator(), g = ctx.createGain();
                        o.connect(g); g.connect(ctx.destination);
                        o.type = 'sine'; o.frequency.setValueAtTime(820, now);
                        g.gain.setValueAtTime(0.18, now);
                        g.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
                        o.start(now); o.stop(now + 1.2);
                        setTimeout(() => {
                            const o2=ctx.createOscillator(),g2=ctx.createGain();
                            o2.connect(g2);g2.connect(ctx.destination);
                            o2.frequency.setValueAtTime(820,ctx.currentTime);
                            g2.gain.setValueAtTime(0.06,ctx.currentTime);
                            g2.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.9);
                            o2.start();o2.stop(ctx.currentTime+0.9);
                        }, 320);
                        break;
                    }
                    case 'arcade': {
                        const o = ctx.createOscillator(), g = ctx.createGain();
                        o.connect(g); g.connect(ctx.destination);
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(220, now);
                        o.frequency.linearRampToValueAtTime(880, now + 0.22);
                        g.gain.setValueAtTime(0.05, now);
                        g.gain.linearRampToValueAtTime(0.0001, now + 0.22);
                        o.start(now); o.stop(now + 0.22);
                        break;
                    }

                    /* ── NEW Sounds ── */
                    case 'cash': {
                        // Ca-ching: two bright tones
                        this._osc(1568,'sine',0.07,0.15,now);
                        this._osc(1976,'sine',0.15,0.2,now+0.06);
                        // mechanical click noise
                        const buf=ctx.createBuffer(1,ctx.sampleRate*0.04,ctx.sampleRate);
                        const d=buf.getChannelData(0);
                        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.25));
                        const src=ctx.createBufferSource(),gn=ctx.createGain();
                        src.buffer=buf; src.connect(gn); gn.connect(ctx.destination);
                        gn.gain.setValueAtTime(0.35,now+0.16); src.start(now+0.16);
                        break;
                    }
                    case 'zen': {
                        // Tibetan bowl: fundamental + 3 harmonics, long fade
                        [220, 440, 660, 880].forEach((f,i) => {
                            const o=ctx.createOscillator(),g=ctx.createGain();
                            o.connect(g);g.connect(ctx.destination);
                            o.type='sine'; o.frequency.setValueAtTime(f,now);
                            const v=0.12/(i+1);
                            g.gain.setValueAtTime(0,now);
                            g.gain.linearRampToValueAtTime(v,now+0.05);
                            g.gain.exponentialRampToValueAtTime(0.0001,now+3.0);
                            o.start(now);o.stop(now+3.0);
                        });
                        break;
                    }
                    case 'laser': {
                        const o=ctx.createOscillator(),g=ctx.createGain();
                        o.connect(g);g.connect(ctx.destination);
                        o.type='sawtooth';
                        o.frequency.setValueAtTime(2200,now);
                        o.frequency.exponentialRampToValueAtTime(150,now+0.28);
                        g.gain.setValueAtTime(0.09,now);
                        g.gain.exponentialRampToValueAtTime(0.0001,now+0.28);
                        o.start(now);o.stop(now+0.28);
                        break;
                    }
                    case 'retro8': {
                        // 8-bit ascending arpeggio
                        [330,392,523,659].forEach((n,i) => {
                            const o=ctx.createOscillator(),g=ctx.createGain();
                            o.connect(g);g.connect(ctx.destination);
                            o.type='square'; o.frequency.setValueAtTime(n,now+i*0.075);
                            g.gain.setValueAtTime(0.06,now+i*0.075);
                            g.gain.exponentialRampToValueAtTime(0.0001,now+i*0.075+0.065);
                            o.start(now+i*0.075);o.stop(now+i*0.075+0.065);
                        });
                        break;
                    }
                    case 'wood': {
                        // Woodblock: short pitched knock
                        const o=ctx.createOscillator(),g=ctx.createGain();
                        o.connect(g);g.connect(ctx.destination);
                        o.type='sine';
                        o.frequency.setValueAtTime(420,now);
                        o.frequency.exponentialRampToValueAtTime(180,now+0.09);
                        g.gain.setValueAtTime(0.25,now);
                        g.gain.exponentialRampToValueAtTime(0.0001,now+0.1);
                        o.start(now);o.stop(now+0.1);
                        break;
                    }
                    case 'alarm': {
                        // Two-tone alternating alarm
                        for(let i=0;i<4;i++){
                            const f=i%2===0?880:660;
                            const o=ctx.createOscillator(),g=ctx.createGain();
                            o.connect(g);g.connect(ctx.destination);
                            o.type='square'; o.frequency.setValueAtTime(f,now+i*0.13);
                            g.gain.setValueAtTime(0.045,now+i*0.13);
                            g.gain.setValueAtTime(0.045,now+i*0.13+0.11);
                            g.gain.exponentialRampToValueAtTime(0.0001,now+i*0.13+0.13);
                            o.start(now+i*0.13);o.stop(now+i*0.13+0.13);
                        }
                        break;
                    }
                    case 'pop': {
                        // Friendly notification pop
                        const o=ctx.createOscillator(),g=ctx.createGain();
                        o.connect(g);g.connect(ctx.destination);
                        o.type='sine';
                        o.frequency.setValueAtTime(350,now);
                        o.frequency.linearRampToValueAtTime(600,now+0.04);
                        o.frequency.linearRampToValueAtTime(280,now+0.11);
                        g.gain.setValueAtTime(0.22,now);
                        g.gain.exponentialRampToValueAtTime(0.0001,now+0.12);
                        o.start(now);o.stop(now+0.12);
                        break;
                    }
                    case 'wind': {
                        // Ethereal wind chime (3 random tones)
                        const base=[523,659,784,1047,1319];
                        [0,0.1,0.22].forEach((delay,i) => {
                            const f=base[Math.floor(Math.random()*base.length)];
                            const o=ctx.createOscillator(),g=ctx.createGain();
                            o.connect(g);g.connect(ctx.destination);
                            o.type='sine'; o.frequency.setValueAtTime(f,now+delay);
                            g.gain.setValueAtTime(0,now+delay);
                            g.gain.linearRampToValueAtTime(0.09,now+delay+0.02);
                            g.gain.exponentialRampToValueAtTime(0.0001,now+delay+0.8);
                            o.start(now+delay);o.stop(now+delay+0.8);
                        });
                        break;
                    }
                    case 'blip': {
                        // Short punchy UI blip
                        const o=ctx.createOscillator(),g=ctx.createGain();
                        o.connect(g);g.connect(ctx.destination);
                        o.type='triangle';
                        o.frequency.setValueAtTime(900,now);
                        o.frequency.setValueAtTime(700,now+0.03);
                        g.gain.setValueAtTime(0.15,now);
                        g.gain.exponentialRampToValueAtTime(0.0001,now+0.07);
                        o.start(now);o.stop(now+0.07);
                        break;
                    }
                    default:
                        this._osc(1200,'sine',0.55,0.12);
                }
            }
        };

        /* ══════════════════════════════════════
           SOUNDS CONFIG
        ══════════════════════════════════════ */
        const SOUNDS = [
            { value:'glass',  emoji:'🔔', name:'Glass'     },
            { value:'digital',emoji:'💻', name:'Digital'   },
            { value:'chime',  emoji:'🎵', name:'Chime'     },
            { value:'sonar',  emoji:'📡', name:'Sonar'     },
            { value:'arcade', emoji:'🕹️', name:'Arcade'    },
            { value:'cash',   emoji:'💰', name:'Ca-Ching'  },
            { value:'zen',    emoji:'🪔', name:'Zen Bowl'  },
            { value:'laser',  emoji:'⚡', name:'Laser'     },
            { value:'retro8', emoji:'👾', name:'8-Bit'     },
            { value:'wood',   emoji:'🪵', name:'Wood Block'},
            { value:'alarm',  emoji:'⏰', name:'Old Alarm' },
            { value:'pop',    emoji:'💬', name:'Pop'       },
            { value:'wind',   emoji:'🌬️', name:'Wind Chime'},
            { value:'blip',   emoji:'🔵', name:'UI Blip'   },
        ];

        function buildSoundGrid() {
            const grid = document.getElementById('soundGrid');
            grid.innerHTML = '';
            SOUNDS.forEach(s => {
                const card = document.createElement('div');
                card.className = 'sound-card' + (state.soundPreference === s.value ? ' selected' : '');
                card.dataset.value = s.value;
                card.innerHTML = `<span class="s-emoji">${s.emoji}</span><span class="s-name">${s.name}</span>`;
                card.addEventListener('click', () => {
                    Audio.init();
                    state.soundPreference = s.value;
                    document.querySelectorAll('.sound-card').forEach(c => c.classList.toggle('selected', c.dataset.value === s.value));
                    Audio.play(s.value);
                    saveState();
                });
                grid.appendChild(card);
            });
        }

        /* ══════════════════════════════════════
           NOTIFICATION MESSAGES
        ══════════════════════════════════════ */
        const MSGS = [
            {text:"Feed the log monster! 🦖",emoji:"🦖"},
            {text:"Ring ring! Log that thing! ☎️",emoji:"☎️"},
            {text:"Ghosting your tracker? 👻",emoji:"👻"},
            {text:"Stats or it didn't happen. 📉",emoji:"📉"},
            {text:"Your logs are getting lonely. 🥺",emoji:"🥺"},
            {text:"I see you... not logging. 🕵️",emoji:"🕵️"},
            {text:"Donut forget to log! 🍩",emoji:"🍩"},
            {text:"Stay cool, log calls. 🧊",emoji:"🧊"},
            {text:"Paint the chart green. 🎨",emoji:"🎨"},
            {text:"Time is ticking! ⏳",emoji:"⏳"},
            {text:"You're on fire! 🔥",emoji:"🔥"},
            {text:"Level up! 🆙",emoji:"🆙"},
            {text:"Time to update your records. 📋",emoji:"📋"},
            {text:"Please log your recent calls. 📞",emoji:"📞"},
            {text:"Keep your metrics up to date. 📊",emoji:"📊"},
            {text:"Consistency is key. 🗝️",emoji:"🗝️"},
            {text:"Track your progress. 🚀",emoji:"🚀"},
        ];

        /* ══════════════════════════════════════
           APP STATE & LOGIC
        ══════════════════════════════════════ */
        const callList     = document.getElementById('callListContainer');
        const emptyState   = document.getElementById('emptyState');
        const progressText = document.getElementById('progressText');
        const progressBar  = document.getElementById('progressBar');
        const addCallBtn   = document.getElementById('addCallBtn');
        const resetDataBtn = document.getElementById('resetDataBtn');
        const lastUpdTxt   = document.getElementById('lastUpdatedText');
        const rateChart    = document.getElementById('rateChart');
        const reminderBtn  = document.getElementById('reminderToggleBtn');
        const reminderCtrl = document.getElementById('reminderControls');
        const reminderSldr = document.getElementById('reminderSlider');
        const reminderLbl  = document.getElementById('reminderTimeLabel');
        const setReminderB = document.getElementById('setReminderBtn');
        const previewBtn   = document.getElementById('previewSoundBtn');
        const randomBtn    = document.getElementById('randomizeSoundBtn');

        const initState = () => ({ calls:[], lastUpdated:null, reminderInterval:0, reminderTimerId:null, soundPreference:'glass' });
        let state = initState();

        function loadState() {
            const s = localStorage.getItem('callFlowV7');
            if (s) state = { ...initState(), ...JSON.parse(s), reminderTimerId:null };
        }
        function saveState() {
            state.lastUpdated = new Date().toISOString();
            const {reminderTimerId,...save} = state;
            localStorage.setItem('callFlowV7', JSON.stringify(save));
        }
        function relativeTime(d) {
            if (!d) return 'No updates yet.';
            const secs = Math.round((Date.now()-new Date(d))/1000);
            const mins = Math.round(secs/60);
            if (secs<10) return 'just now';
            if (secs<60) return `${secs}s ago`;
            if (mins<60) return `${mins}m ago`;
            return new Date(d).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        }

        function renderChart() {
            const dp=[]; let done=0;
            const sorted=[...state.calls].sort((a,b)=>a.number-b.number);
            sorted.forEach((c,i)=>{ if(c.completed)done++; dp.push((done/(i+1))*100); });
            const W=500,H=100,P=5;
            rateChart.innerHTML=`<defs><linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:var(--accent);stop-opacity:0.3"/><stop offset="100%" style="stop-color:var(--accent);stop-opacity:0"/></linearGradient></defs><line class="grid-line" x1="0" y1="${H/2}" x2="${W}" y2="${H/2}"/>`;
            if(dp.length<2)return;
            const pts=dp.map((r,i)=>`${(i/(dp.length-1))*W},${(H-P*2)-(r/100)*(H-P*2)+P}`).join(' ');
            const poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');
            poly.setAttribute('class','chart-line'); poly.setAttribute('points',pts);
            rateChart.appendChild(poly);
            dp.forEach((r,i)=>{
                const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
                c.setAttribute('class','chart-point');
                c.setAttribute('cx',(i/(dp.length-1))*W);
                c.setAttribute('cy',(H-P*2)-(r/100)*(H-P*2)+P);
                c.setAttribute('r',4);
                rateChart.appendChild(c);
            });
        }

        function render() {
            const total=state.calls.length, done=state.calls.filter(c=>c.completed).length;
            const pct=total>0?(done/total)*100:0;
            progressText.textContent=`${pct.toFixed(0)}%`;
            progressBar.style.width=`${pct}%`;
            lastUpdTxt.textContent=`Updated ${relativeTime(state.lastUpdated)}`;

            callList.innerHTML='';
            if(total===0){
                callList.appendChild(emptyState); emptyState.style.display='flex';
            } else {
                emptyState.style.display='none';
                [...state.calls].reverse().forEach(call=>{
                    const el=document.createElement('div');
                    el.className=`call-item flex items-center justify-between p-3 rounded-lg transition-all duration-300 ${call.completed?'opacity-50':'opacity-100'}`;
                    el.dataset.id=call.id;
                    const time=new Date(call.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
                    el.innerHTML=`<div class="flex-grow pr-2"><p class="${call.completed?'line-through subtle-text':''}">Call #${call.number}</p><p class="text-xs subtle-text">${time}</p></div><div class="flex items-center gap-2"><button class="delete-btn p-2 rounded-full transition-colors" style="color:var(--subtle)" onmouseover="this.style.background='var(--danger)';this.style.color='#fff'" onmouseout="this.style.background='';this.style.color='var(--subtle)'" data-id="${call.id}" data-number="${call.number}"><span class="material-symbols-outlined" style="font-size:16px">delete</span></button><label class="toggle-switch"><input type="checkbox" ${call.completed?'checked':''}><span class="slider"></span></label></div>`;
                    callList.appendChild(el);
                });
            }

            reminderSldr.value=state.reminderInterval;
            reminderLbl.textContent=state.reminderInterval>0?`${state.reminderInterval} min`:'Off';
            reminderBtn.style.color=state.reminderInterval>0?'var(--accent)':'var(--subtle)';

            buildSoundGrid();
            renderChart();
            saveState();
        }

        function nextCallNum() { return state.calls.length===0?1:Math.max(...state.calls.map(c=>c.number))+1; }
        function addCall()      { state.calls.push({id:Date.now(),number:nextCallNum(),completed:false,createdAt:new Date().toISOString()}); render(); callList.scrollTop=0; }
        function toggleCall(id) { const c=state.calls.find(c=>c.id==id); if(c){c.completed=!c.completed;render();} }
        function deleteCall(id) { state.calls=state.calls.filter(c=>c.id!=id); render(); }
        function resetAll()     { cancelReminder(); state=initState(); render(); }

        function notify() {
            panel.classList.add('is-reminding');
            panel.addEventListener('animationend',()=>panel.classList.remove('is-reminding'),{once:true});
            Audio.play(state.soundPreference||'glass');
            const msg=MSGS[Math.floor(Math.random()*MSGS.length)];
            if(Notification.permission==='granted') new Notification('Call Flow Reminder',{body:msg.text,icon:`data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>${msg.emoji}</text></svg>`});
            setReminder(state.reminderInterval);
        }
        function setReminder(mins) {
            cancelReminder(); state.reminderInterval=mins;
            if(mins>0) state.reminderTimerId=setTimeout(notify,mins*60*1000);
            render();
        }
        function cancelReminder() { if(state.reminderTimerId){clearTimeout(state.reminderTimerId);state.reminderTimerId=null;} }

        /* ── Event Listeners ── */
        callList.addEventListener('click', e=>{
            const del=e.target.closest('.delete-btn');
            if(del) openDeleteModal(del.dataset.id,del.dataset.number);
        });
        callList.addEventListener('change', e=>{
            if(e.target.matches('input[type="checkbox"]')) toggleCall(e.target.closest('.call-item').dataset.id);
        });
        addCallBtn.addEventListener('click', addCall);
        resetDataBtn.addEventListener('click', openResetModal);
        reminderBtn.addEventListener('click', ()=>reminderCtrl.classList.toggle('visible'));
        reminderSldr.addEventListener('input', e=>{
            reminderLbl.textContent=e.target.value>0?`${e.target.value} min`:'Off';
        });
        previewBtn.addEventListener('click', ()=>{ Audio.init(); Audio.play(state.soundPreference||'glass'); });
        randomBtn.addEventListener('click', ()=>{
            Audio.init();
            const s=SOUNDS[Math.floor(Math.random()*SOUNDS.length)];
            state.soundPreference=s.value;
            buildSoundGrid();
            Audio.play(s.value);
            saveState();
        });
        setReminderB.addEventListener('click', ()=>{
            const mins=parseInt(reminderSldr.value,10);
            Audio.init();
            if(mins>0&&Notification.permission==='default'){
                Notification.requestPermission().then(p=>{ if(p==='granted')setReminder(mins); });
            } else setReminder(mins);
            reminderCtrl.classList.remove('visible');
        });
        document.addEventListener('click', e=>{
            if(!reminderBtn.contains(e.target)&&!reminderCtrl.contains(e.target))
                reminderCtrl.classList.remove('visible');
        });

        /* ── Modals ── */
        const resetModal  = document.getElementById('resetConfirmModal');
        const deleteModal = document.getElementById('deleteConfirmModal');
        function modalHTML(title,icon,body,confirmId,confirmLabel) {
            return `<div style="background:var(--card-bg);border:1px solid var(--danger);backdrop-filter:blur(20px)" class="rounded-xl p-6 w-full max-w-md space-y-4 shadow-2xl"><h3 class="text-base font-semibold flex items-center gap-2" style="color:var(--danger)"><span class="material-symbols-outlined">${icon}</span>${title}</h3><p class="subtle-text text-sm">${body}</p><div class="flex justify-end gap-3"><button class="cancel-btn px-4 py-2 rounded-lg text-sm custom-hover transition-colors" style="color:var(--text)">Cancel</button><button id="${confirmId}" class="text-white font-bold px-4 py-2 rounded-lg text-sm transition-colors" style="background:var(--danger)">${confirmLabel}</button></div></div>`;
        }
        function openResetModal() {
            resetModal.innerHTML=modalHTML('Reset All Data','warning','Are you sure? All calls will be permanently deleted.','confirmReset','Yes, Reset');
            resetModal.classList.remove('hidden');
            resetModal.querySelector('.cancel-btn').addEventListener('click',()=>resetModal.classList.add('hidden'));
            resetModal.querySelector('#confirmReset').addEventListener('click',()=>{resetAll();resetModal.classList.add('hidden');});
        }
        function openDeleteModal(id,num) {
            deleteModal.innerHTML=modalHTML('Delete Call','delete',`Delete <strong>Call #${num}</strong>? This cannot be undone.`,'confirmDelete','Yes, Delete');
            deleteModal.classList.remove('hidden');
            deleteModal.querySelector('.cancel-btn').addEventListener('click',()=>deleteModal.classList.add('hidden'));
            deleteModal.querySelector('#confirmDelete').addEventListener('click',()=>{deleteCall(id);deleteModal.classList.add('hidden');});
        }

        loadState();
        setReminder(state.reminderInterval);
        render();
    });
    </script>
</body>
</html>
