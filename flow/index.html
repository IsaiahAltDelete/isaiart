        html[data-mode="light"][data-style="neumorphic"] #trackerPanel { background:var(--bg) !important; backdrop-filter:none !important; -webkit-backdrop-filter:none !important; border:none !important; box-shadow:14px 14px 28px rgba(163,177,198,0.65),-14px -14px 28px rgba(255,255,255,0.85) !important; }

        html[data-mode="light"][data-style="neumorphic"] #themePanel { background:var(--bg) !important; border:none !important; box-shadow:10px 10px 20px rgba(163,177,198,0.55),-10px -10px 20px rgba(255,255,255,0.75) !important; }
        html[data-mode="light"][data-style="neumorphic"] .sound-card { box-shadow:4px 4px 8px rgba(163,177,198,0.5),-4px -4px 8px rgba(255,255,255,0.7); border:none !important; }
        html[data-mode="light"][data-style="neumorphic"] .sound-card.selected { box-shadow:inset 3px 3px 7px rgba(163,177,198,0.5),inset -3px -3px 7px rgba(255,255,255,0.7) !important; }

        html[data-style="minimal"] { --panel-radius:0.375rem;--btn-radius:0.125rem; }

        html[data-mode="light"][data-style="cyberpunk"][data-color="green"]  { --bg:#E0FFE8;--text:#003322;--subtle:#337755;--card-bg:#C8FFDA;--border:#003322;--accent:#003322;--accent-hover:#001A11;--hover-bg:rgba(0,51,34,0.08); }

        .sound-card:hover { background:var(--hover-bg); border-color:var(--accent); transform:translateY(-1px); }
        .sound-card.selected { background:var(--accent-trans); border-color:var(--accent); }
        .sound-card .s-emoji { font-size:1.15rem; line-height:1; }
        .sound-card .s-name { font-size:0.55rem; color:var(--subtle); text-align:center; line-height:1.2; }
        .sound-card.selected .s-name { color:var(--accent); font-weight:600; }

        #themePanel { position:fixed; top:72px; right:1.5rem; width:296px; background:var(--card-bg); border:1px solid var(--border); border-radius:1rem; padding:1rem; box-shadow:0 16px 40px var(--shadow); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); z-index:65; opacity:0; transform:translateY(-8px) scale(0.96); pointer-events:none; transition:opacity 0.22s,transform 0.22s; }
        #themePanel.visible { opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }

        .mode-pill { display:flex; background:var(--hover-bg); border-radius:9999px; border:1px solid var(--border); padding:3px; gap:2px; margin-bottom:0.9rem; }
        .mode-pill-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:5px; padding:5px 10px; border-radius:9999px; font-size:0.7rem; font-weight:600; cursor:pointer; transition:all 0.2s; color:var(--subtle); font-family:var(--font-main); border:none; background:transparent; }
        .mode-pill-btn.active { background:var(--card-bg); color:var(--text); box-shadow:0 2px 8px var(--shadow); }
        html[data-mode="light"] .mode-pill-btn.active { background:#fff; }

        .tp-label { font-size:0.6rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--subtle); margin-bottom:7px; display:block; }
        .style-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:1rem; }
        .style-btn { display:flex; flex-direction:column; align-items:center; gap:5px; padding:8px 4px; background:var(--input-bg); border:1.5px solid var(--border); border-radius:0.625rem; cursor:pointer; transition:all 0.18s; font-size:0.6rem; color:var(--subtle); font-family:var(--font-main); }
        .style-btn:hover { border-color:var(--accent); color:var(--text); }
        .style-btn.selected { border-color:var(--accent); background:var(--accent-trans); color:var(--accent); font-weight:600; }
        .style-preview { width:52px; height:34px; border-radius:4px; overflow:hidden; position:relative; flex-shrink:0; }

        .color-row { display:flex; gap:7px; flex-wrap:wrap; }
        .color-dot { width:30px; height:30px; border-radius:50%; cursor:pointer; border:2.5px solid transparent; transition:transform 0.18s,box-shadow 0.18s; }
        .color-dot:hover { transform:scale(1.18); }
        .color-dot.selected { box-shadow:0 0 0 2px var(--bg),0 0 0 4.5px var(--text); }
    </style>
</head>
<body>

                <span>Neumorphic</span>

            <button class="style-btn" data-style="minimal">
                <div class="style-preview" style="background:#fff;border:1px solid #ddd;border-radius:2px;"><div style="position:absolute;top:7px;left:6px;right:16px;height:1px;background:#ccc;"></div><div style="position:absolute;bottom:6px;left:6px;right:6px;height:1px;background:#eee;"></div></div>

                <div class="style-preview" style="background:#080808;border:2px solid #33FF66;border-radius:0;background-image:linear-gradient(rgba(51,255,102,0.15) 1px,transparent 1px),linear-gradient(90deg,rgba(51,255,102,0.15) 1px,transparent 1px);background-size:8px 8px;"><div style="position:absolute;bottom:4px;left:4px;right:4px;height:3px;background:#33FF66;border-radius:0;"></div></div>
                <span>Cyberpunk</span>

            <button class="style-btn" data-style="pixelart">
                <div class="style-preview" style="background:#1a1c2c;border:3px solid #6b6bae;border-radius:0;image-rendering:pixelated;"><div style="position:absolute;top:4px;left:4px;right:4px;height:4px;background:#ff004d;border-radius:0;"></div><div style="position:absolute;bottom:4px;left:4px;width:8px;height:8px;background:#00e436;"></div><div style="position:absolute;bottom:4px;left:16px;width:8px;height:8px;background:#29adff;"></div></div>
                <span>Pixel Art</span>

            <button class="style-btn" data-style="retro">

                <div class="style-preview" style="background:linear-gradient(135deg,#8b5e3c,#5a3a18);border:0;"><div style="position:absolute;inset:3px;background:rgba(244,228,183,0.85);border:1px solid #8b6914;display:flex;align-items:center;justify-content:center;font-size:14px;">&#9876;</div></div>

        <span class="tp-label">Color</span>

            <button class="color-dot"          data-color="blue"   style="background:linear-gradient(135deg,#0284C7,#38BDF8);" title="Blue"></button>
            <button class="color-dot"          data-color="green"  style="background:linear-gradient(135deg,#15803D,#22C55E);" title="Green"></button>
            <button class="color-dot"          data-color="pink"   style="background:linear-gradient(135deg,#9D174D,#F472B6);" title="Pink"></button>
            <button class="color-dot"          data-color="orange" style="background:linear-gradient(135deg,#C2410C,#FB923C);" title="Orange"></button>
        </div>
    </div>

    <div id="scene">
        <main id="trackerPanel">
            <div id="retroTitleBar">
                <span>&#128222; Call Flow Tracker</span>
                <div style="display:flex;"><span class="retro-win-btn">_</span><span class="retro-win-btn">&#9633;</span><span class="retro-win-btn">&#10005;</span></div>
            </div>
            <header class="px-4 pb-4 space-y-3" style="border-bottom:1px solid var(--border);transform:translateZ(20px)">
                <h1 class="text-2xl font-bold">Call Flow Tracker</h1>

                    <div class="flex justify-between items-center text-sm"><p class="subtle-text">Overall Completion</p><p id="progressText" class="font-medium">0%</p></div>
                    <div class="w-full h-2 rounded-full" style="background:var(--hover-bg)"><div id="progressBar" class="h-2 rounded-full transition-all duration-500" style="width:0%;background:var(--success)"></div></div>
                </div>
            </header>
            <div id="chartContainer" class="px-4" style="transform:translateZ(30px)"><svg id="rateChart" width="100%" height="100%" viewBox="0 0 500 100" preserveAspectRatio="none"></svg></div>
            <div id="callListContainer" class="flex-grow overflow-y-auto pr-4 py-2" style="border-top:1px solid var(--border);transform:translateZ(10px)">
                <div id="emptyState" class="flex flex-col items-center justify-center h-full text-center p-4 subtle-text">
                    <span class="material-symbols-outlined mb-2" style="font-size:3rem">phone_in_talk</span>
                    <p class="font-medium">Ready for calls!</p>

            </div>

                <div class="flex items-center gap-2">
                    <button id="resetDataBtn" class="p-2 rounded-full custom-hover transition-colors" style="color:var(--subtle)"><span class="material-symbols-outlined" style="font-size:18px">restart_alt</span></button>
                    <div class="relative">
                        <button id="reminderToggleBtn" class="p-2 rounded-full custom-hover transition-colors" style="color:var(--subtle)"><span class="material-symbols-outlined" style="font-size:18px">notifications</span></button>
                        <div id="reminderControls">
                            <div class="mb-3">
                                <label class="tp-label">Reminder Interval</label>
                                <div class="flex items-center gap-3"><input type="range" id="reminderSlider" min="0" max="30" step="1" value="0" class="flex-grow"><span id="reminderTimeLabel" class="text-sm font-medium" style="width:48px;text-align:right">Off</span></div>
                            </div>
                            <div class="mb-3">
                                <div class="flex items-center justify-between mb-1">
                                    <label class="tp-label" style="margin-bottom:0">Notification Sound</label>
                                    <div class="flex items-center gap-1">
                                        <button id="randomizeSoundBtn" class="flex items-center gap-1" style="font-size:0.62rem;padding:3px 7px;border-radius:0.375rem;background:var(--hover-bg);color:var(--subtle);border:1px solid var(--border)" title="Randomize"><span class="material-symbols-outlined" style="font-size:13px">shuffle</span><span>Random</span></button>
                                        <button id="previewSoundBtn" style="padding:3px 6px;border-radius:0.375rem;background:var(--hover-bg);color:var(--subtle);border:1px solid var(--border)" title="Preview"><span class="material-symbols-outlined" style="font-size:13px">play_arrow</span></button>
                                    </div>

                                <div class="sound-grid" id="soundGrid"></div>

                        </div>
                    </div>
                    <div class="hidden md:flex items-center gap-1 subtle-text text-xs ml-1"><span class="material-symbols-outlined" style="font-size:14px">history</span><span id="lastUpdatedText"></span></div>
                </div>
                <button id="addCallBtn" class="accent-bg font-bold px-4 py-2 transition-all flex items-center gap-2 shadow-md hover:shadow-lg hover:scale-105 active:scale-100" style="border-radius:var(--btn-radius)">
                    <span class="material-symbols-outlined" style="font-size:18px">add_call</span>
                    <span class="hidden sm:inline text-sm">Add New Call</span>
                </button>
            </footer>
        </main>
    </div>
    <div id="resetConfirmModal"  class="fixed inset-0 z-[80] flex items-center justify-center p-4 hidden" style="background:rgba(0,0,0,0.55);backdrop-filter:blur(6px)"></div>
    <div id="deleteConfirmModal" class="fixed inset-0 z-[80] flex items-center justify-center p-4 hidden" style="background:rgba(0,0,0,0.55);backdrop-filter:blur(6px)"></div>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const html=document.documentElement, panel=document.getElementById('trackerPanel');

        // 3D DRAG
        let isDragging=false,prevX,prevY,rotX=0,rotY=0;
        panel.addEventListener('mousedown',e=>{if(e.target.closest('button,input,a,.sound-card,.slider'))return;isDragging=true;prevX=e.clientX;prevY=e.clientY;panel.style.transition='transform 0.05s linear';});
        document.addEventListener('mousemove',e=>{if(!isDragging)return;rotY+=(e.clientX-prevX)*0.25;rotX-=(e.clientY-prevY)*0.25;rotX=Math.max(-15,Math.min(15,rotX));panel.style.transform=`rotateX(${rotX}deg) rotateY(${rotY}deg)`;prevX=e.clientX;prevY=e.clientY;});
        document.addEventListener('mouseup',()=>{if(!isDragging)return;isDragging=false;panel.style.transition='transform 0.6s cubic-bezier(0.25,0.1,0.25,1)';panel.style.transform='rotateX(0deg) rotateY(0deg)';rotX=0;rotY=0;});
        panel.ondragstart=()=>false;

        // MATRIX RAIN
        const matrixCanvas=document.getElementById('matrixCanvas');
        const mCtx=matrixCanvas.getContext('2d');
        const MCHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*!?+-=><アイウエオカキクケコサシスセソタチツテトナニヌネノ';
        let matrixAnimId=null, mDrops=[];
        function mResize(){matrixCanvas.width=window.innerWidth;matrixCanvas.height=window.innerHeight;const cols=Math.floor(matrixCanvas.width/14);mDrops=Array.from({length:cols},()=>Math.random()*-matrixCanvas.height);}
        function mTick(){
            const accent=getComputedStyle(html).getPropertyValue('--accent').trim()||'#33FF66';
            mCtx.fillStyle='rgba(0,0,0,0.045)';
            mCtx.fillRect(0,0,matrixCanvas.width,matrixCanvas.height);
            mCtx.font='14px VT323,monospace';
            mDrops.forEach((y,i)=>{
                const ch=MCHARS[Math.floor(Math.random()*MCHARS.length)];
                mCtx.fillStyle=Math.random()>0.92?'#ffffff':accent;
                mCtx.fillText(ch,i*14,y);
                if(y>matrixCanvas.height&&Math.random()>0.975)mDrops[i]=0;
                mDrops[i]+=14;
            });
            matrixAnimId=requestAnimationFrame(mTick);
        }
        function startMatrix(){if(matrixAnimId)return;mResize();mTick();}
        function stopMatrix(){if(matrixAnimId){cancelAnimationFrame(matrixAnimId);matrixAnimId=null;}mCtx.clearRect(0,0,matrixCanvas.width,matrixCanvas.height);}
        window.addEventListener('resize',()=>{if(currentStyle==='cyberpunk')mResize();});

        // THEME SYSTEM
        let currentStyle=localStorage.getItem('cft-style')||'default';
        let currentColor=localStorage.getItem('cft-color')||'dark';
        let currentMode =localStorage.getItem('cft-mode') ||'dark';

        function applyMode(mode){currentMode=mode;html.setAttribute('data-mode',mode);localStorage.setItem('cft-mode',mode);document.getElementById('modeDark').classList.toggle('active',mode==='dark');document.getElementById('modeLight').classList.toggle('active',mode==='light');}
        function applyStyle(style){
            currentStyle=style;html.setAttribute('data-style',style);localStorage.setItem('cft-style',style);
            document.querySelectorAll('.style-btn').forEach(b=>b.classList.toggle('selected',b.dataset.style===style));
            if(style==='cyberpunk')startMatrix(); else stopMatrix();
        }
        function applyColor(color){currentColor=color;html.setAttribute('data-color',color);localStorage.setItem('cft-color',color);document.querySelectorAll('.color-dot').forEach(d=>d.classList.toggle('selected',d.dataset.color===color));}

        applyMode(currentMode);applyStyle(currentStyle);applyColor(currentColor);

        const themePanel=document.getElementById('themePanel');
        document.getElementById('themePickerBtn').addEventListener('click',e=>{e.stopPropagation();themePanel.classList.toggle('visible');});
        document.getElementById('closePanelBtn').addEventListener('click',()=>themePanel.classList.remove('visible'));
        document.getElementById('modeDark').addEventListener('click',()=>applyMode('dark'));
        document.getElementById('modeLight').addEventListener('click',()=>applyMode('light'));
        document.querySelectorAll('.style-btn').forEach(b=>b.addEventListener('click',()=>applyStyle(b.dataset.style)));
        document.querySelectorAll('.color-dot').forEach(d=>d.addEventListener('click',()=>applyColor(d.dataset.color)));
        document.addEventListener('click',e=>{if(!themePanel.contains(e.target)&&!document.getElementById('themePickerBtn').contains(e.target))themePanel.classList.remove('visible');});

        // AUDIO ENGINE
        const Audio={
            ctx:null,init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended')this.ctx.resume();},
            _osc(freq,type,dur,vol=0.1,at=null){const t=at??this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();o.connect(g);g.connect(this.ctx.destination);o.type=type;o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur);},
            play(type){
                this.init();const ctx=this.ctx,now=ctx.currentTime;
                switch(type){
                    case 'glass':this._osc(1200,'sine',0.55,0.12);break;
                    case 'digital':{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='square';o.frequency.setValueAtTime(700,now);o.frequency.exponentialRampToValueAtTime(120,now+0.15);g.gain.setValueAtTime(0.08,now);g.gain.exponentialRampToValueAtTime(0.0001,now+0.15);o.start(now);o.stop(now+0.15);break;}
                    case 'chime':this._osc(523.25,'sine',0.55,0.1,now);this._osc(659.25,'sine',0.55,0.09,now+0.06);this._osc(783.99,'sine',0.55,0.08,now+0.12);break;
                    case 'sonar':{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(820,now);g.gain.setValueAtTime(0.18,now);g.gain.exponentialRampToValueAtTime(0.0001,now+1.2);o.start(now);o.stop(now+1.2);setTimeout(()=>{const o2=ctx.createOscillator(),g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);o2.frequency.setValueAtTime(820,ctx.currentTime);g2.gain.setValueAtTime(0.06,ctx.currentTime);g2.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.9);o2.start();o2.stop(ctx.currentTime+0.9);},320);break;}
                    case 'arcade':{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sawtooth';o.frequency.setValueAtTime(220,now);o.frequency.linearRampToValueAtTime(880,now+0.22);g.gain.setValueAtTime(0.05,now);g.gain.linearRampToValueAtTime(0.0001,now+0.22);o.start(now);o.stop(now+0.22);break;}
                    case 'cash':{this._osc(1568,'sine',0.07,0.15,now);this._osc(1976,'sine',0.15,0.2,now+0.06);const buf=ctx.createBuffer(1,ctx.sampleRate*0.04,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.25));const src=ctx.createBufferSource(),gn=ctx.createGain();src.buffer=buf;src.connect(gn);gn.connect(ctx.destination);gn.gain.setValueAtTime(0.35,now+0.16);src.start(now+0.16);break;}
                    case 'zen':[220,440,660,880].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(f,now);const v=0.12/(i+1);g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(v,now+0.05);g.gain.exponentialRampToValueAtTime(0.0001,now+3.0);o.start(now);o.stop(now+3.0);});break;
                    case 'laser':{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sawtooth';o.frequency.setValueAtTime(2200,now);o.frequency.exponentialRampToValueAtTime(150,now+0.28);g.gain.setValueAtTime(0.09,now);g.gain.exponentialRampToValueAtTime(0.0001,now+0.28);o.start(now);o.stop(now+0.28);break;}
                    case 'retro8':[330,392,523,659].forEach((n,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='square';o.frequency.setValueAtTime(n,now+i*0.075);g.gain.setValueAtTime(0.06,now+i*0.075);g.gain.exponentialRampToValueAtTime(0.0001,now+i*0.075+0.065);o.start(now+i*0.075);o.stop(now+i*0.075+0.065);});break;
                    case 'wood':{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(420,now);o.frequency.exponentialRampToValueAtTime(180,now+0.09);g.gain.setValueAtTime(0.25,now);g.gain.exponentialRampToValueAtTime(0.0001,now+0.1);o.start(now);o.stop(now+0.1);break;}
                    case 'alarm':for(let i=0;i<4;i++){const f=i%2===0?880:660,o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='square';o.frequency.setValueAtTime(f,now+i*0.13);g.gain.setValueAtTime(0.045,now+i*0.13);g.gain.setValueAtTime(0.045,now+i*0.13+0.11);g.gain.exponentialRampToValueAtTime(0.0001,now+i*0.13+0.13);o.start(now+i*0.13);o.stop(now+i*0.13+0.13);}break;
                    case 'pop':{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(350,now);o.frequency.linearRampToValueAtTime(600,now+0.04);o.frequency.linearRampToValueAtTime(280,now+0.11);g.gain.setValueAtTime(0.22,now);g.gain.exponentialRampToValueAtTime(0.0001,now+0.12);o.start(now);o.stop(now+0.12);break;}
                    case 'wind':[0,0.1,0.22].forEach(delay=>{const base=[523,659,784,1047,1319],f=base[Math.floor(Math.random()*base.length)],o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(f,now+delay);g.gain.setValueAtTime(0,now+delay);g.gain.linearRampToValueAtTime(0.09,now+delay+0.02);g.gain.exponentialRampToValueAtTime(0.0001,now+delay+0.8);o.start(now+delay);o.stop(now+delay+0.8);});break;
                    case 'blip':{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='triangle';o.frequency.setValueAtTime(900,now);o.frequency.setValueAtTime(700,now+0.03);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.0001,now+0.07);o.start(now);o.stop(now+0.07);break;}
                    default:this._osc(1200,'sine',0.55,0.12);
                }
            }
        };

        const SOUNDS=[{value:'glass',emoji:'\uD83D\uDD14',name:'Glass'},{value:'digital',emoji:'\uD83D\uDCBB',name:'Digital'},{value:'chime',emoji:'\uD83C\uDFB5',name:'Chime'},{value:'sonar',emoji:'\uD83D\uDCE1',name:'Sonar'},{value:'arcade',emoji:'\uD83D\uDFB9',name:'Arcade'},{value:'cash',emoji:'\uD83D\uDCB0',name:'Ca-Ching'},{value:'zen',emoji:'\uD83E\uDED4',name:'Zen Bowl'},{value:'laser',emoji:'\u26A1',name:'Laser'},{value:'retro8',emoji:'\uD83D\uDC7E',name:'8-Bit'},{value:'wood',emoji:'\uD83E\uDEB5',name:'Wood Block'},{value:'alarm',emoji:'\u23F0',name:'Old Alarm'},{value:'pop',emoji:'\uD83D\uDCAC',name:'Pop'},{value:'wind',emoji:'\uD83C\uDF2C',name:'Wind'},{value:'blip',emoji:'\uD83D\uDD35',name:'UI Blip'}];

        function buildSoundGrid(){const g=document.getElementById('soundGrid');g.innerHTML='';SOUNDS.forEach(s=>{const c=document.createElement('div');c.className='sound-card'+(state.soundPreference===s.value?' selected':'');c.dataset.value=s.value;c.innerHTML='<span class="s-emoji">'+s.emoji+'</span><span class="s-name">'+s.name+'</span>';c.addEventListener('click',()=>{Audio.init();state.soundPreference=s.value;document.querySelectorAll('.sound-card').forEach(x=>x.classList.toggle('selected',x.dataset.value===s.value));Audio.play(s.value);saveState();});g.appendChild(c);});}

        const MSGS=[{text:"Feed the log monster!",emoji:"\uD83E\uDD96"},{text:"Ring ring! Log that thing!",emoji:"\u260E"},{text:"Ghosting your tracker?",emoji:"\uD83D\uDC7B"},{text:"Stats or it didn't happen.",emoji:"\uD83D\uDCC9"},{text:"Your logs are lonely.",emoji:"\uD83D\uDE22"},{text:"Donut forget to log!",emoji:"\uD83C\uDF69"},{text:"You're on fire!",emoji:"\uD83D\uDD25"},{text:"Level up!",emoji:"\uD83C\uDD99"},{text:"Keep metrics updated.",emoji:"\uD83D\uDCCA"},{text:"Consistency is key.",emoji:"\uD83D\uDD11"},{text:"Track your progress.",emoji:"\uD83D\uDE80"}];

        const callList=document.getElementById('callListContainer'),emptyState=document.getElementById('emptyState'),progressText=document.getElementById('progressText'),progressBar=document.getElementById('progressBar'),addCallBtn=document.getElementById('addCallBtn'),resetDataBtn=document.getElementById('resetDataBtn'),lastUpdTxt=document.getElementById('lastUpdatedText'),rateChart=document.getElementById('rateChart'),reminderBtn=document.getElementById('reminderToggleBtn'),reminderCtrl=document.getElementById('reminderControls'),reminderSldr=document.getElementById('reminderSlider'),reminderLbl=document.getElementById('reminderTimeLabel'),setReminderB=document.getElementById('setReminderBtn'),previewBtn=document.getElementById('previewSoundBtn'),randomBtn=document.getElementById('randomizeSoundBtn');

        const initState=()=>({calls:[],lastUpdated:null,reminderInterval:0,reminderTimerId:null,soundPreference:'glass'});
        let state=initState();
        function loadState(){const s=localStorage.getItem('callFlowV8');if(s)state={...initState(),...JSON.parse(s),reminderTimerId:null};}
        function saveState(){state.lastUpdated=new Date().toISOString();const{reminderTimerId,...save}=state;localStorage.setItem('callFlowV8',JSON.stringify(save));}
        function relTime(d){if(!d)return'No updates yet.';const sc=Math.round((Date.now()-new Date(d))/1000),mn=Math.round(sc/60);if(sc<10)return'just now';if(sc<60)return sc+'s ago';if(mn<60)return mn+'m ago';return new Date(d).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

        function renderChart(){const dp=[];let done=0;const sorted=[...state.calls].sort((a,b)=>a.number-b.number);sorted.forEach((c,i)=>{if(c.completed)done++;dp.push((done/(i+1))*100);});const W=500,H=100,P=5;rateChart.innerHTML='<defs><linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:var(--accent);stop-opacity:0.3"/><stop offset="100%" style="stop-color:var(--accent);stop-opacity:0"/></linearGradient></defs><line class="grid-line" x1="0" y1="'+(H/2)+'" x2="'+W+'" y2="'+(H/2)+'"/>';if(dp.length<2)return;const pts=dp.map((r,i)=>((i/(dp.length-1))*W)+','+(((H-P*2)-(r/100)*(H-P*2)+P))).join(' ');const poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');poly.setAttribute('class','chart-line');poly.setAttribute('points',pts);rateChart.appendChild(poly);dp.forEach((r,i)=>{const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('class','chart-point');c.setAttribute('cx',(i/(dp.length-1))*W);c.setAttribute('cy',(H-P*2)-(r/100)*(H-P*2)+P);c.setAttribute('r',4);rateChart.appendChild(c);});}

        function render(){const total=state.calls.length,done=state.calls.filter(c=>c.completed).length,pct=total>0?(done/total)*100:0;progressText.textContent=pct.toFixed(0)+'%';progressBar.style.width=pct+'%';lastUpdTxt.textContent='Updated '+relTime(state.lastUpdated);callList.innerHTML='';if(total===0){callList.appendChild(emptyState);emptyState.style.display='flex';}else{emptyState.style.display='none';[...state.calls].reverse().forEach(call=>{const el=document.createElement('div');el.className='call-item flex items-center justify-between p-3 rounded-lg transition-all duration-300 '+(call.completed?'opacity-50':'opacity-100');el.dataset.id=call.id;const time=new Date(call.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});el.innerHTML='<div class="flex-grow pr-2"><p class="'+(call.completed?'line-through subtle-text':'')+'">Call #'+call.number+'</p><p class="text-xs subtle-text">'+time+'</p></div><div class="flex items-center gap-2"><button class="delete-btn p-2 rounded-full transition-colors" style="color:var(--subtle)" onmouseover="this.style.background=\'var(--danger)\';this.style.color=\'#fff\'" onmouseout="this.style.background=\'\';this.style.color=\'var(--subtle)\'" data-id="'+call.id+'" data-number="'+call.number+'"><span class="material-symbols-outlined" style="font-size:16px">delete</span></button><label class="toggle-switch"><input type="checkbox" '+(call.completed?'checked':'')+'><span class="slider"></span></label></div>';callList.appendChild(el);});}reminderSldr.value=state.reminderInterval;reminderLbl.textContent=state.reminderInterval>0?state.reminderInterval+' min':'Off';reminderBtn.style.color=state.reminderInterval>0?'var(--accent)':'var(--subtle)';buildSoundGrid();renderChart();saveState();}

        function nextNum(){return state.calls.length===0?1:Math.max(...state.calls.map(c=>c.number))+1;}
        function addCall(){state.calls.push({id:Date.now(),number:nextNum(),completed:false,createdAt:new Date().toISOString()});render();callList.scrollTop=0;}
        function toggleCall(id){const c=state.calls.find(c=>c.id==id);if(c){c.completed=!c.completed;render();}}
        function deleteCall(id){state.calls=state.calls.filter(c=>c.id!=id);render();}
        function resetAll(){cancelReminder();state=initState();render();}
        function notify(){panel.classList.add('is-reminding');panel.addEventListener('animationend',()=>panel.classList.remove('is-reminding'),{once:true});Audio.play(state.soundPreference||'glass');const msg=MSGS[Math.floor(Math.random()*MSGS.length)];if(Notification.permission==='granted')new Notification('Call Flow Reminder',{body:msg.text});setReminder(state.reminderInterval);}
        function setReminder(mins){cancelReminder();state.reminderInterval=mins;if(mins>0)state.reminderTimerId=setTimeout(notify,mins*60*1000);render();}
        function cancelReminder(){if(state.reminderTimerId){clearTimeout(state.reminderTimerId);state.reminderTimerId=null;}}

        callList.addEventListener('click',e=>{const d=e.target.closest('.delete-btn');if(d)openDeleteModal(d.dataset.id,d.dataset.number);});
        callList.addEventListener('change',e=>{if(e.target.matches('input[type="checkbox"]'))toggleCall(e.target.closest('.call-item').dataset.id);});
        addCallBtn.addEventListener('click',addCall);resetDataBtn.addEventListener('click',openResetModal);
        reminderBtn.addEventListener('click',()=>reminderCtrl.classList.toggle('visible'));
        reminderSldr.addEventListener('input',e=>{reminderLbl.textContent=e.target.value>0?e.target.value+' min':'Off';});
        previewBtn.addEventListener('click',()=>{Audio.init();Audio.play(state.soundPreference||'glass');});
        randomBtn.addEventListener('click',()=>{Audio.init();const s=SOUNDS[Math.floor(Math.random()*SOUNDS.length)];state.soundPreference=s.value;buildSoundGrid();Audio.play(s.value);saveState();});
        setReminderB.addEventListener('click',()=>{const m=parseInt(reminderSldr.value,10);Audio.init();if(m>0&&Notification.permission==='default'){Notification.requestPermission().then(p=>{if(p==='granted')setReminder(m);});}else setReminder(m);reminderCtrl.classList.remove('visible');});
        document.addEventListener('click',e=>{if(!reminderBtn.contains(e.target)&&!reminderCtrl.contains(e.target))reminderCtrl.classList.remove('visible');});

        const resetModal=document.getElementById('resetConfirmModal'),deleteModal=document.getElementById('deleteConfirmModal');
        function mHTML(title,icon,body,cid,clabel){return '<div style="background:var(--card-bg);border:1px solid var(--danger);backdrop-filter:blur(20px)" class="rounded-xl p-6 w-full max-w-md space-y-4 shadow-2xl"><h3 class="text-base font-semibold flex items-center gap-2" style="color:var(--danger)"><span class="material-symbols-outlined">'+icon+'</span>'+title+'</h3><p class="subtle-text text-sm">'+body+'</p><div class="flex justify-end gap-3"><button class="cancel-btn px-4 py-2 rounded-lg text-sm custom-hover" style="color:var(--text)">Cancel</button><button id="'+cid+'" class="text-white font-bold px-4 py-2 rounded-lg text-sm" style="background:var(--danger)">'+clabel+'</button></div></div>';}
        function openResetModal(){resetModal.innerHTML=mHTML('Reset All','warning','Are you sure? All calls will be permanently deleted.','confirmReset','Yes, Reset');resetModal.classList.remove('hidden');resetModal.querySelector('.cancel-btn').addEventListener('click',()=>resetModal.classList.add('hidden'));resetModal.querySelector('#confirmReset').addEventListener('click',()=>{resetAll();resetModal.classList.add('hidden');});}
        function openDeleteModal(id,num){deleteModal.innerHTML=mHTML('Delete Call','delete','Delete <strong>Call #'+num+'</strong>? This cannot be undone.','confirmDelete','Yes, Delete');deleteModal.classList.remove('hidden');deleteModal.querySelector('.cancel-btn').addEventListener('click',()=>deleteModal.classList.add('hidden'));deleteModal.querySelector('#confirmDelete').addEventListener('click',()=>{deleteCall(id);deleteModal.classList.add('hidden');});}

        loadState();setReminder(state.reminderInterval);render();
    });
    </script>
</body>
</html>
