    --border: #2a2a35;

    --gold-light: #e8c97a;
    --gold-dim: #7a6030;
    --text: #e8e4d8;
    --text-dim: #9a9488;
    --text-muted: #5a5650;
    --accent: #8b4a6e;
    --accent2: #4a6e8b;
    --red: #8b3a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 16px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* BG texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(74,110,139,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .page-wrap {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 64px 0 48px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .header-eyebrow {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 5vw, 4rem);
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 16px;
  }

  h1 em {
    color: var(--gold);
    font-style: italic;
  }

  .header-sub {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--text-dim);
    font-size: 1.05rem;
    max-width: 580px;
    margin: 0 auto;
  }

  .header-ornament {
    font-size: 1.4rem;
    color: var(--gold-dim);
    margin: 20px 0 0;
    letter-spacing: 0.5em;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 48px;
    width: fit-content;
  }

  .tab-btn {
    background: var(--surface);
    border: none;
    color: var(--text-dim);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 13px 32px;
    cursor: pointer;
    transition: all 0.2s;
    border-right: 1px solid var(--border);
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn:hover { color: var(--gold); background: var(--surface2); }
  .tab-btn.active {
    background: var(--surface2);
    color: var(--gold);
    box-shadow: inset 0 -2px 0 var(--gold);
  }

  /* SECTION VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* ALPHA INDEX */
  .alpha-index {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .alpha-index a {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--gold-dim);
    text-decoration: none;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 2px;
    transition: all 0.15s;
  }
  .alpha-index a:hover { color: var(--gold); border-color: var(--gold-dim); }

  /* ALPHA GROUP */
  .alpha-group { margin-bottom: 48px; }
  .alpha-letter {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 900;
    color: var(--gold-dim);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 24px;
    line-height: 1;
  }

  /* POPULARITY TIERS */
  .tier-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .tier-badge {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .tier-1 .tier-badge { background: var(--gold); color: #0d0d0f; }
  .tier-2 .tier-badge { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--gold-dim); }
  .tier-3 .tier-badge { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }

  .tier-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--text-dim);
    font-size: 1rem;
  }

  .tier-section { margin-bottom: 56px; }

  .style-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .style-card:hover { border-color: var(--gold-dim); }

  .card-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 24px 16px;
    cursor: pointer;
    user-select: none;
  }

  .card-title-row {
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }

  .style-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
  }

  .style-period {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(201,168,76,0.08);
    padding: 3px 8px;
    border-radius: 2px;
  }

  .card-toggle {
    font-size: 1.1rem;
    color: var(--text-muted);
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .style-card.open .card-toggle { transform: rotate(180deg); color: var(--gold); }

  .card-tagline {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--text-dim);
    font-size: 0.95rem;
    padding: 0 24px 14px;
  }

  .card-body {
    display: none;
    padding: 0 24px 24px;
    border-top: 1px solid var(--border);
  }
  .style-card.open .card-body { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }

  .detail-block h4 {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 8px;
  }

  .detail-block ul {
    list-style: none;
    padding: 0;
  }

  .detail-block ul li {
    font-size: 0.92rem;
    color: var(--text-dim);
    padding: 2px 0 2px 14px;
    position: relative;
    line-height: 1.5;
  }
  .detail-block ul li::before {
    content: '·';
    position: absolute;
    left: 2px;
    color: var(--gold-dim);
  }

  .detail-desc {
    margin-top: 20px;
    font-size: 0.97rem;
    color: var(--text-dim);
    line-height: 1.75;
    border-left: 2px solid var(--gold-dim);
    padding-left: 16px;

    display: inline-block;

    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 7px;
    border-radius: 2px;
    margin: 3px 3px 0 0;
  }
  .notable-wrap { margin-top: 12px; }

  .search-bar {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
  }
  .search-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 4px 0 0 4px;
    color: var(--text);
    font-family: 'EB Garamond', serif;
    font-size: 1rem;
    padding: 11px 16px;
    outline: none;
  }
  .search-bar input:focus { border-color: var(--gold-dim); }
  .search-bar input::placeholder { color: var(--text-muted); }
  .search-bar button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 0 4px 4px 0;
    color: var(--gold);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 11px 20px;
    cursor: pointer;
  }

  .count-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }
  .count-label span { color: var(--gold); font-weight: 600; }

    text-align: center;
    padding: 40px 0 20px;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    .detail-grid { grid-template-columns: 1fr 1fr; }
    .card-header { padding: 14px 16px 12px; }
    .card-tagline { padding: 0 16px 10px; }
    .card-body { padding: 0 16px 18px; }
  }
</style>
</head>

// Sort alphabetically
const alphaSorted = [...styles].sort((a, b) => a.name.localeCompare(b.name));

// Sort by popularity (1 = most popular), secondary alpha
const popSorted = [...styles].sort((a, b) => a.popularity - b.popularity || a.name.localeCompare(b.name));

// Build a card
function buildCard(s, id) {
  return `
  <div class="style-card" id="card-${id}" onclick="toggleCard('card-${id}')">
    <div class="card-header">
      <div class="card-title-row">
        <span class="style-name">${s.name}</span>
        <span class="style-period">${s.period}</span>
      </div>
      <span class="card-toggle">▾</span>
    </div>
    <div class="card-tagline">${s.tagline}</div>
    <div class="card-body">
      <p class="detail-desc">${s.desc}</p>
      <div class="detail-grid">
        <div class="detail-block">
          <h4>Mediums</h4>
          <ul>${s.mediums.map(m=>`<li>${m}</li>`).join('')}</ul>
        </div>
        <div class="detail-block">
          <h4>Materials</h4>
          <ul>${s.materials.map(m=>`<li>${m}</li>`).join('')}</ul>
        </div>
        <div class="detail-block">
          <h4>Stroke / Technique</h4>
          <ul>${s.strokes.map(m=>`<li>${m}</li>`).join('')}</ul>
        </div>
        <div class="detail-block">
          <h4>Texture Characteristics</h4>
          <ul>${s.textures.map(m=>`<li>${m}</li>`).join('')}</ul>
        </div>
      </div>
      <div class="notable-wrap">
        ${s.notable.map(n=>`<span class="notable-tag">${n}</span>`).join('')}
      </div>
    </div>
  </div>`;
}

// Build alphabetical view
function buildAlpha(list) {
  const letters = {};
  list.forEach(s => {
    const l = s.name[0].toUpperCase();
    if (!letters[l]) letters[l] = [];
    letters[l].push(s);
  });

  let indexHtml = '<div class="alpha-index">';
  Object.keys(letters).sort().forEach(l => {
    indexHtml += `<a href="#alpha-${l}">${l}</a>`;
  });
  indexHtml += '</div>';

  let bodyHtml = '';
  let cardId = 0;
  Object.keys(letters).sort().forEach(l => {
    bodyHtml += `<div class="alpha-group" id="alpha-${l}">
      <div class="alpha-letter">${l}</div>`;
    letters[l].forEach(s => {
      bodyHtml += buildCard(s, 'a-' + cardId++);
    });
    bodyHtml += '</div>';
  });

  document.getElementById('alphaContent').innerHTML = indexHtml + `<div id="alphaCards">${bodyHtml}</div>`;
}

// Build popularity view
function buildPop() {
  const tiers = [
    { key: 1, label: 'Iconic', sub: 'Universally recognized, globally taught, endlessly referenced.' },
    { key: 2, label: 'Established', sub: 'Widely known, studied in depth, significant cultural presence.' },
    { key: 3, label: 'Specialist', sub: 'Important within art history, studied by enthusiasts and scholars.' }
  ];
  let html = '';
  let cardId = 0;
  tiers.forEach(t => {
    const group = popSorted.filter(s => s.popularity === t.key);
    html += `<div class="tier-section tier-${t.key}">
      <div class="tier-header">
        <span class="tier-badge">${t.label}</span>
        <span class="tier-label">${t.sub}</span>
      </div>`;
    group.forEach(s => { html += buildCard(s, 'p-' + cardId++); });
    html += '</div>';
  });
  document.getElementById('popContent').innerHTML = html;
}

function toggleCard(id) {
  const card = document.getElementById(id);
  card.classList.toggle('open');
}

function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.getAttribute('onclick').includes("'"+tab+"'")) b.classList.add('active');
  });
}

function filterStyles() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!query) {
    buildAlpha(alphaSorted);
    document.getElementById('countDisplay').textContent = alphaSorted.length;
    return;
  }
  const filtered = alphaSorted.filter(s =>
    s.name.toLowerCase().includes(query) ||
    s.tagline.toLowerCase().includes(query) ||
    s.desc.toLowerCase().includes(query) ||
    s.mediums.some(m => m.toLowerCase().includes(query)) ||
    s.materials.some(m => m.toLowerCase().includes(query)) ||
    s.strokes.some(m => m.toLowerCase().includes(query)) ||
    s.textures.some(m => m.toLowerCase().includes(query)) ||
    s.notable.some(m => m.toLowerCase().includes(query)) ||
    s.period.toLowerCase().includes(query)
  );
  buildAlpha(filtered);
  document.getElementById('countDisplay').textContent = filtered.length;
}

buildAlpha(alphaSorted);
buildPop();
</script>
