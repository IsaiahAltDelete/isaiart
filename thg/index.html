<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    
    <!-- Fallback 1: Instant Meta Refresh (0 seconds) -->
    <meta http-equiv="refresh" content="0;url=https://thg.isaiart.com">

    <!-- Primary: Instant JavaScript Redirect -->
    <script>
        // Using replace() instead of href so this redirect page isn't saved in the browser's "Back" history
        window.location.replace("https://thg.isaiart.com");
    </script>

    <style>
        /* Minimal styling just in case the user's browser blocks automatic redirects */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        a {
            color: #2563eb;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Fallback 2: Manual link if strict browser security blocks both JS and Meta redirects -->
    <noscript>
        <p>If you are not redirected automatically, <a href="https://thg.isaiart.com">click here</a>.</p>
    </noscript>
</body>
</html>
